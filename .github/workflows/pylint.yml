---
name: Run pylint

"on":
  push:
    branches:
      - main # Set a branch to deploy
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
      - name: Running tests
        run: |
          python -m pip install --quiet --no-cache-dir --upgrade uv
          uv run ruff check tests goodwe2pvoutput
